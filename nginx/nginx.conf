worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ── Upstream services ────────────────────────────────────────────────────
    upstream streamlit_app {
        server frontend:8501;
    }

    upstream fastapi_app {
        server api:8000;
    }

    # ── HTTP → HTTPS redirect (activo solo si tienes SSL) ────────────────────
    # Descomentar cuando tengas certificado SSL:
    # server {
    #     listen 80;
    #     server_name TU_DOMINIO.com;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name _;          # acepta cualquier hostname; cambia por tu dominio

        # ── Streamlit frontend ───────────────────────────────────────────────
        # Streamlit usa WebSockets — es crítico pasar los headers Upgrade/Connection
        location / {
            proxy_pass         http://streamlit_app;
            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Streamlit puede tardar en responder — aumentar timeouts
            proxy_read_timeout    86400s;
            proxy_send_timeout    86400s;
            proxy_connect_timeout 60s;
        }

        # ── FastAPI — endpoints y docs ───────────────────────────────────────
        location /api/ {
            proxy_pass       http://fastapi_app/api/;
            proxy_http_version 1.1;
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://fastapi_app/health;
        }

        location /docs {
            proxy_pass http://fastapi_app/docs;
        }

        location /openapi.json {
            proxy_pass http://fastapi_app/openapi.json;
        }

        # ── SSL (descomentar y ajustar cuando tengas certificado) ────────────
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/certs/fullchain.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
    }
}
