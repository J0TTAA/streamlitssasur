version: "3.9"

# ── Servicios ─────────────────────────────────────────────────────────────────
#
#   db        → PostgreSQL 16          :5432
#   api       → FastAPI                :8000  (siembra la DB al arrancar)
#   frontend  → Streamlit              :8501  (consume la API)
#
# Primer uso  : docker compose up --build
# Rebuild API : docker compose up --build api
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Base de datos ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: interconsultas_db
    environment:
      POSTGRES_USER:     interconsultas
      POSTGRES_PASSWORD: interconsultas
      POSTGRES_DB:       interconsultas
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # expuesto para herramientas locales (opcional)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interconsultas -d interconsultas"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
    container_name: interconsultas_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data:ro          # JSON de semilla (solo lectura)
    environment:
      DATA_DIR:     /data
      DATABASE_URL: postgresql://interconsultas:interconsultas@db:5432/interconsultas
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL",
             "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 40s

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: interconsultas_frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

# ── Volúmenes ─────────────────────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local
